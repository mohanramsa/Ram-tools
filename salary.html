<!DOCTYPE html>
<html>
<head>
<title>SalaryPro Professional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{font-family:Arial;background:#f2f4f8;}
.container{
width:650px;margin:auto;background:white;padding:20px;
border-radius:10px;box-shadow:0 0 10px #ccc;margin-top:20px;
}
.form-row{display:flex;justify-content:space-between;margin-top:8px;}
.form-group{width:48%;}
.form-group label{display:block;font-weight:bold;}
.form-group input,.form-group select{width:100%;padding:5px;}
button{
margin-top:10px;padding:8px 15px;background:#2c7be5;
color:white;border:none;border-radius:5px;cursor:pointer;
}
table{margin-top:20px;width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:5px;font-size:12px;}
h2{text-align:center;}
</style>

</head>

<body>

<div class="container">

<h2>Salary Register Entry</h2>

<div class="form-row">
<div class="form-group">
<label>Business Name</label>
<input type="text" id="bname">
</div>
<div class="form-group">
<label>Salary Date</label>
<input type="date" id="sdate">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Month</label>
<select id="month">
<option>January</option><option>February</option>
<option>March</option><option>April</option>
<option>May</option><option>June</option>
<option>July</option><option>August</option>
<option>September</option><option>October</option>
<option>November</option><option>December</option>
</select>
</div>
<div class="form-group">
<label>Year</label>
<select id="year">
<option>2024</option><option>2025</option>
<option selected>2026</option><option>2027</option>
<option>2028</option>
</select>
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Employee ID</label>
<input type="text" id="eid">
</div>
<div class="form-group">
<label>Employee Name</label>
<input type="text" id="name">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Designation</label>
<input type="text" id="desig">
</div>
<div class="form-group">
<label>No. of Days Present</label>
<input type="number" id="days">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Per Day Salary</label>
<input type="number" id="perday">
</div>
<div class="form-group">
<label>HRA</label>
<input type="number" id="hra">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>DA</label>
<input type="number" id="da">
</div>
<div class="form-group">
<label>PF</label>
<input type="number" id="pf">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Advance</label>
<input type="number" id="adv">
</div>
<div class="form-group">
<label>Suspense</label>
<input type="number" id="sus">
</div>
</div>

<button onclick="addEmp()">Add Employee</button>
<button onclick="deleteLastEmp()">Delete Employee</button>
<button onclick="printAll()">Print All PDF</button>

<table id="t">
<tr>
<th>ID</th><th>Name</th><th>Days</th>
<th>Basic</th><th>Gross</th><th>Net</th>
<th>Actions</th>
</table>

</div>

<script>

document.getElementById("sdate").valueAsDate=new Date();

let emps=[];

function addEmp(){

let eid=document.getElementById("eid").value;
let name=document.getElementById("name").value;
let desig=document.getElementById("desig").value;
let days=Number(document.getElementById("days").value);
let perday=Number(document.getElementById("perday").value);
let hra=Number(document.getElementById("hra").value);
let da=Number(document.getElementById("da").value);
let pf=Number(document.getElementById("pf").value);
let adv=Number(document.getElementById("adv").value);
let sus=Number(document.getElementById("sus").value);

let basic=days*perday;
let gross=basic+hra+da;
let net=gross-(pf+adv+sus);

emps.push({eid,name,desig,days,perday,basic,hra,da,pf,adv,sus,gross,net});

let index = emps.length-1;

let t=document.getElementById("t");
let r=t.insertRow();

r.insertCell(0).innerHTML=eid;
r.insertCell(1).innerHTML=name;
r.insertCell(2).innerHTML=days;
r.insertCell(3).innerHTML=basic;
r.insertCell(4).innerHTML=gross;
r.insertCell(5).innerHTML=net;
r.insertCell(6).innerHTML=
"<button onclick='editEmp("+index+")'>Edit</button> "+
"<button onclick='deleteEmp("+index+")'>Delete</button>";

}

function printAll(){

const {jsPDF}=window.jspdf;
let doc=new jsPDF();

let bname=document.getElementById("bname").value;
let month=document.getElementById("month").value;
let year=document.getElementById("year").value;
let sdate=document.getElementById("sdate").value;

doc.setFontSize(14);
doc.text(bname,14,10);

doc.setFontSize(11);
doc.text("Salary Register - "+month+" "+year,14,18);
doc.text("Date: "+sdate,150,18);

let rows=[];
emps.forEach((e,i)=>{
rows.push([i+1,e.eid,e.name,e.desig,e.days,e.perday,e.basic,e.hra,e.da,e.pf,e.adv,e.sus,e.net]);
});

doc.autoTable({
startY:25,
head:[["Sl","ID","Name","Desig","Days","PerDay","Basic","HRA","DA","PF","Advance","Suspense","Net"]],
body:rows,
theme:'grid',
styles:{fontSize:7},
headStyles:{fillColor:[0,102,204],textColor:[255,255,255],fontStyle:'bold'}
});

let finalY = doc.lastAutoTable.finalY + 10;

doc.setTextColor(0,0,0);
doc.text("Total Employees Added: "+emps.length,14,finalY);

finalY+=8;

doc.setTextColor(255,0,0);
doc.text("Maximum 200 employees can be added at once in one entry.",14,finalY);

finalY+=6;
doc.text("If more employees are required, please refresh the page and continue.",14,finalY);

finalY+=10;

doc.setTextColor(0,0,0);
doc.text("Formula Used:",14,finalY);

finalY+=6;
doc.text("Basic Salary = No.of Days Present x Per Day Salary",14,finalY);

finalY+=6;
doc.text("Gross Salary = Basic + HRA + DA",14,finalY);

finalY+=6;
doc.text("Net Salary = Gross - (PF + Advance + Suspense)",14,finalY);

finalY+=10;

doc.setTextColor(255,0,0);
doc.text("Note: No employee data is saved or stored in this website.",14,finalY);

doc.save("salary_register.pdf");

}
function deleteLastEmp(){
emps.pop();
document.getElementById("t").deleteRow(-1);
}
function deleteEmp(index){
emps.splice(index,1);
refreshTable();
}
function editEmp(index){

let e=emps[index];

document.getElementById("eid").value=e.eid;
document.getElementById("name").value=e.name;
document.getElementById("desig").value=e.desig;
document.getElementById("days").value=e.days;
document.getElementById("perday").value=e.perday;
document.getElementById("hra").value=e.hra;
document.getElementById("da").value=e.da;
document.getElementById("pf").value=e.pf;
document.getElementById("adv").value=e.adv;
document.getElementById("sus").value=e.sus;

emps.splice(index,1);
refreshTable();
}
function refreshTable(){

let t=document.getElementById("t");

while(t.rows.length>1){
t.deleteRow(1);
}

emps.forEach((e,i)=>{

let r=t.insertRow();

r.insertCell(0).innerHTML=e.eid;
r.insertCell(1).innerHTML=e.name;
r.insertCell(2).innerHTML=e.days;
r.insertCell(3).innerHTML=e.basic;
r.insertCell(4).innerHTML=e.gross;
r.insertCell(5).innerHTML=e.net;
r.insertCell(6).innerHTML=
"<button onclick='editEmp("+i+")'>Edit</button> "+
"<button onclick='deleteEmp("+i+")'>Delete</button>";

});
}

</script>
</body>
</html>
